<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" type="text/css" href="/css/style.css">
</head>
<body>
<header th:fragment="ShopHeader">
    <a href="/">
        <span class="title">MyShop</span>
    </a>

    <a th:href="@{/order/cart}" class="cart-ico">
        <div>
            <span>Koszyk</span>
            <span th:text=" (${@cart.getCount()}) ">(0)</span>
            <span th:text="${@cart.getSum()}">0</span>
            <span>zł</span>
        </div>
    </a>
</header>
</body>
</html>
