<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyShop</title>
    <link rel="stylesheet" type="text/css" href="/css/style.css">
</head>
<body>
<header th:replace="fragments/header :: ShopHeader"></header>

    <div class="main-content">

        <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">

            <table cellspacing="0">
                <tr>
                    <th style="width: 30px;">No.</th>
                    <th style="width: 50px;"></th>
                    <th>Nazwa</th>
                    <th>Ilość</th>
                    <th>Suma</th>
                    <th style="width: 30px;"></th>
                </tr>
                <tr th:each="cartItem, iStat : ${@cart.getItems()}">
                    <td th:text="${iStat.index + 1}"></td>
                    <td>
                        <img th:src="${cartItem.getItem().getImgURL()}">
                    </td>
                    <td th:text="${cartItem.item.getName()}"></td>
                    <td style="display: flex; padding-top: 10px">
                        <a class="mbtn" th:href="@{'/order/remove/' + ${cartItem.getItem().id}}">-</a>
                        <p  th:text="${cartItem.getCount()}"></p>
                        <a class="mbtn" th:href="@{'/order/add/' + ${cartItem.getItem().id}}">+</a>
                    </td>
                    <td th:text="${cartItem.getPrice()}"></td>
                    <td>
                        <a class="mbtn" th:href="@{'/order/removeAll/' + ${cartItem.getItem().id}}">X</a>
                    </td>
                </tr>
            </table>

            <div class="summary">
                <p><span>Do zapłaty </span><span th:text="${@cart.getSum()}"></span> zł</p>
            </div>
            <a href="" class="add-btn">Dalej</a>
        </div>
    </div>
</body>
</html>
